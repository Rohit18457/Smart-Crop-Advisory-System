# Ruff configuration for Python linting
# Run: pip install ruff && ruff check backend/

[tool.ruff]
target-version = "py310"
line-length = 120

[tool.ruff.lint]
select = [
    "E",     # pycodestyle errors
    "W",     # pycodestyle warnings
    "F",     # pyflakes
    "I",     # isort
    "B",     # flake8-bugbear
    "UP",    # pyupgrade
    "S",     # flake8-bandit (security)
]
ignore = [
    "S101",  # assert used (OK in tests)
    "S104",  # binding to 0.0.0.0 (intentional)
    "E501",  # line too long (handled by formatter)
]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["S101"]
"config_disease.py" = ["E501"]
"config_market.py" = ["E501"]

[tool.ruff.format]
quote-style = "double"

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
